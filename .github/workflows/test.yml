name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

      # Explicit required gate for the example/feature harness: every
      # examples/*.py must compile, instantiate, and pass its asserted-result
      # tests (tests/integration/, tests/unit/). Also covered by the full run
      # above; kept as its own step so a harness failure is visible by name.
      - name: Integration and unit harness (required gate)
        run: cargo test --all-features --test integration_examples --test integration_coverage --test unit_basics
